<!-- Import parseTorrent directly as an ES module -->
<script type="module">
  import parseTorrent from 'https://esm.sh/parse-torrent@11.0.1';

  let activeMode = 'magnet';

  // Make switchTab available to button onclick handlers
  window.switchTab = function(mode) {
    activeMode = mode;
    document.getElementById('tabMagnet').classList.toggle('active', mode === 'magnet');
    document.getElementById('tabTorrent').classList.toggle('active', mode === 'torrent');
    
    document.getElementById('magnetGroup').style.display = mode === 'magnet' ? 'block' : 'none';
    document.getElementById('torrentGroup').style.display = mode === 'torrent' ? 'block' : 'none';
  };

  // Main processing function
  window.processDownload = async function() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const statusDiv = document.getElementById('statusMessage');
    const resultDiv = document.getElementById('resultContainer');

    if (!apiKey) {
      alert('Please enter your NITHEESH API KEY!');
      return;
    }

    statusDiv.className = 'status';
    statusDiv.innerText = 'Processing request...';
    resultDiv.style.display = 'none';

    try {
      let magnetLink = '';

      if (activeMode === 'magnet') {
        magnetLink = document.getElementById('magnetLink').value.trim();
        if (!magnetLink) {
          alert('Please enter a Magnet link!');
          return;
        }
      } else {
        const fileInput = document.getElementById('torrentFile');
        if (!fileInput.files || fileInput.files.length === 0) {
          alert('Please select a .torrent file!');
          return;
        }

        statusDiv.innerText = 'Parsing torrent file...';
        const file = fileInput.files[0];
        const arrayBuffer = await file.arrayBuffer();

        // Parse .torrent file to magnet URI client-side
        const parsed = await parseTorrent(new Uint8Array(arrayBuffer));
        magnetLink = parseTorrent.toMagnetURI(parsed);
      }

      statusDiv.innerText = 'Adding magnet to server...';

      // Add Magnet Link to Real-Debrid API
      const res = await fetch('https://api.real-debrid.com/rest/1.0/torrents/addMagnet', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({ 'magnet': magnetLink })
      });

      if (!res.ok) throw new Error('Failed to add magnet link. Please verify your API key.');
      const data = await res.json();
      const torrentId = data.id;

      // Select All Files
      await fetch(`https://api.real-debrid.com/rest/1.0/torrents/selectFiles/${torrentId}`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({ 'files': 'all' })
      });

      statusDiv.innerText = 'Generating high-speed download link...';

      // Fetch Torrent Info
      const infoRes = await fetch(`https://api.real-debrid.com/rest/1.0/torrents/info/${torrentId}`, {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      const infoData = await infoRes.json();

      if (!infoData.links || infoData.links.length === 0) {
        throw new Error('Link generation in progress. Please click Convert again in a few seconds.');
      }

      // Unrestrict Link
      const unrestrictRes = await fetch('https://api.real-debrid.com/rest/1.0/unrestrict/link', {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${apiKey}`,
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: new URLSearchParams({ 'link': infoData.links[0] })
      });

      if (!unrestrictRes.ok) throw new Error('Failed to unrestrict download link.');
      const unrestrictData = await unrestrictRes.json();

      // Render Direct Link
      statusDiv.className = 'status success';
      statusDiv.innerText = 'Direct Link Generated Successfully!';

      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `<a href="${unrestrictData.download}" target="_blank" rel="noopener noreferrer">🚀 Download File (${(unrestrictData.filesize / (1024 * 1024)).toFixed(2)} MB)</a>`;

    } catch (err) {
      statusDiv.className = 'status error';
      statusDiv.innerText = `Error: ${err.message}`;
    }
  };
</script>
